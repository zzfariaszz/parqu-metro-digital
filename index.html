<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Parquimetro</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>PARQUIMETRO DIGITAL</h1>

        <div class="card">
            <label for="valor">Insira o valor(R$):</label>
            <input type="number" id="valor" step="0.01" placeholder="Ex: 2.00">

            <button onclick="simular()">Calcular Tempo</button>

            <div id="resultado"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
